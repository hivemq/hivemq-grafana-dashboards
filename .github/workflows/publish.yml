name: Publish

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Publish
        run: ./gradlew githubRelease
        env:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
